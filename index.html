<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Pintar Ceria - 1000 Level</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- LAYAR 1: MENU UTAMA -->
    <div id="layar-menu" class="layar aktif">
        <div class="logo">🌟 Pintar Ceria 🌟</div>
        <p class="sub-judul">Pilih usia anak:</p>
        
        <div class="grid-kategori">
            <button class="btn-kat" data-mulai="1" data-akhir="50">
                <div class="emoji-kat">👶</div>
                <div class="nama-kat">1-2 Tahun</div>
                <div class="level-kat">Level 1-50</div>
            </button>
            <button class="btn-kat" data-mulai="51" data-akhir="150">
                <div class="emoji-kat">🧒</div>
                <div class="nama-kat">2-3 Tahun</div>
                <div class="level-kat">Level 51-150</div>
            </button>
            <button class="btn-kat" data-mulai="151" data-akhir="300">
                <div class="emoji-kat">👦</div>
                <div class="nama-kat">3-4 Tahun</div>
                <div class="level-kat">Level 151-300</div>
            </button>
            <button class="btn-kat" data-mulai="301" data-akhir="500">
                <div class="emoji-kat">👧</div>
                <div class="nama-kat">4-5 Tahun</div>
                <div class="level-kat">Level 301-500</div>
            </button>
            <button class="btn-kat" data-mulai="501" data-akhir="750">
                <div class="emoji-kat">👨</div>
                <div class="nama-kat">5-6 Tahun</div>
                <div class="level-kat">Level 501-750</div>
            </button>
            <button class="btn-kat" data-mulai="751" data-akhir="1000">
                <div class="emoji-kat"></div>
                <div class="nama-kat">6-7 Tahun</div>
                <div class="level-kat">Level 751-1000</div>
            </button>
        </div>
    </div>

    <!-- LAYAR 2: PILIH LEVEL -->
    <div id="layar-level" class="layar">
        <div class="header-level">
            <button class="btn-kembali" onclick="keMenu()">← Kembali</button>
            <h2 id="judul-level">Level 1-50</h2>
        </div>
        <div id="grid-level" class="grid-level"></div>
    </div>

    <!-- LAYAR 3: BERMAIN -->
    <div id="layar-main" class="layar">
        <div class="header-main">
            <button class="btn-kembali" onclick="keLevel()"></button>
            <div class="info-level">Level <span id="no-level">1</span></div>
            <div class="info-bintang" id="bintang-display">⭐⭐⭐</div>
        </div>
        
        <div class="area-instruksi">
            <div class="instruksi-emoji" id="instruksi-emoji">🔊</div>
            <div class="instruksi-teks" id="instruksi-teks">Tekan tombol suara</div>
            <button class="btn-suara" onclick="ulangInstruksi()"> Dengarkan</button>
        </div>

        <div id="area-soal" class="area-soal"></div>
        
        <div id="feedback" class="feedback"></div>
    </div>

    <!-- LAYAR 4: SELESAI -->
    <div id="layar-selesai" class="layar">
        <div class="box-selesai">
            <div class="emoji-besar">🎉</div>
            <h2>Hebat!</h2>
            <div id="hasil-bintang" class="hasil-bintang">⭐⭐⭐</div>
            <p id="hasil-teks">Kamu luar biasa!</p>
            <div class="aksi-selesai">
                <button class="btn-aksi btn-ulangi" onclick="ulangiLevel()">🔄 Ulangi</button>
                <button class="btn-aksi btn-lanjut" onclick="lanjutLevel()">️ Lanjut</button>
            </div>
        </div>
    </div>

    <div id="konfeti" class="konfeti"></div>

    <script src="game.js"></script>
</body>
</html>
